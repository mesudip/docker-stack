version: '3.8'
secrets:
  my_simple_secret:
    name: my_simple_secret
    external: true
  my_length_secret:
    name: my_length_secret
    external: true
  my_complex_secret:
    name: my_complex_secret
    external: true
  my_no_special_secret:
    name: my_no_special_secret
    external: true
services:
  my_app:
    image: alpine/git
    command:
    - sh
    - -c
    - echo 'Hello from my_app'
    secrets:
    - my_simple_secret
    - my_length_secret
    - my_complex_secret
    - my_no_special_secret
