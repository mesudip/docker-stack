    x-content: |
      net: 
        bindIpAll: true ${NPNO_EXISTING_VARIABLE}
      security:
        keyFile: /run/secrets/security-key
      replication:
        replSetName: "sireto"
  nginx-conf:
    file: ./configs/nginx.conf
    

